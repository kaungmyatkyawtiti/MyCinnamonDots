conky.config = {
    alignment = 'top_right',
    background = false,

    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 190,

    border_width = 1,
    cpu_avg_samples = 2,
    default_color = '#ebdbb2',            -- Gruvbox light beige for default text
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'JetBrainsMono Nerd Font:size=10',
    gap_x = 60,
    gap_y = 60,
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_hints = 'undecorated,sticky,below,skip_taskbar,skip_pager',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

conky.text = [[

${color #b16286}Info:${color #ebdbb2} ${scroll 32 $sysname $nodename $kernel $machine}

${color #d65d0e}${hr}

${color #fabd2f} Time:${color #ebdbb2} ${time %I:%M:%S %p} (${time %H} hr ${time %M} min ${time %S} sec)

${color #fabd2f} Date:${color #ebdbb2} ${time %A, %d %B %Y}

${color #d65d0e}${hr}

${color #83a598} Uptime:${color #ebdbb2} $uptime

${color #83a598} CPU Frequency:${color #ebdbb2} MHz: ${freq}  GHz: ${freq_g}

${color #83a598} RAM Usage:${color #ebdbb2} 
    $mem / $memmax  (${memperc}%) ${color #d79921}${membar 6}

${color #83a598} Swap Usage:${color #ebdbb2} 
    $swap / $swapmax  (${swapperc}%) ${color #d79921}${swapbar 6}

${color #83a598} CPU Usage:${color #ebdbb2} $cpu% ${color #458588}${cpubar 6}

${color #83a598} Processes:${color #ebdbb2} $processes    ${color #83a598} Running:${color #ebdbb2} $running_processes

${color #d65d0e}${hr}

${color #fb4934} File Systems:
${color #689d6a}/ ${color #ebdbb2}${fs_used /} / ${fs_size /} ${color #d79921}${fs_bar 6 /}

${color #fb4934} Networking:
${color #689d6a} Up: ${color #ebdbb2}${upspeed}    ${color #689d6a} Down: ${color #ebdbb2}${downspeed}

]]
